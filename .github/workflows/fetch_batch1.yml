name: Fetch ETF Data - Batch 1

on:
  schedule:
    - cron: '0 21 * * 1-5' # 21:00 UTC weekdays
  workflow_dispatch:      # Allow manual runs for testing

permissions:
  contents: write

jobs:
  fetch-batch1:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas openpyxl

      - name: Run Fetch Batch 1
        run: python scripts/fetch_etf_data.py --batch 1

      - name: Commit and push Excel data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/etf_momentum.csv data/etf_momentum_*.csv data/available_dates.json
          git diff-index --quiet HEAD || (git commit -m "Update ETF momentum data (Batch 1)" && git pull --rebase && git push)
