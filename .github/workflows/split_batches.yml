name: Split Ticker Universe into Batches

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  split-batches:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run split batches script
        run: python scripts/split_batches.py

      - name: Commit and push batch files
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/batch1.json data/batch2.json data/batch3.json
          git diff-index --quiet HEAD || (git commit -m "Update ETF ticker batches" && git push)
